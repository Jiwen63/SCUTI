<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scuti 访问</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
            padding: 20px;
            color: white;
        }
        .card {
            background: #16213e;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 360px;
            width: 100%;
        }
        h1 { font-size: 28px; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 30px; }
        .btn {
            display: block;
            background: #e94560;
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .copy-box {
            background: #0f3460;
            border-radius: 12px;
            padding: 16px;
            font-size: 14px;
            word-break: break-all;
            color: #4fc3f7;
        }
        .copy-btn {
            background: #4fc3f7;
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 16px;
            font-weight: bold;
        }
        .copy-btn:active { transform: scale(0.95); }
        .tip {
            margin-top: 30px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎮 Scuti</h1>
        <p>轻量版访问页</p>
        
        <a href="https://scuti-9j8t.vercel.app" class="btn">
            🚀 直接访问网站
        </a>
        
        <div class="copy-box">
            https://scuti-9j8t.vercel.app
        </div>
        
        <button class="copy-btn" onclick="copyLink()">📋 复制链接</button>
        
        <p class="tip">如果加载慢，请稍等片刻或复制链接到浏览器打开</p>
    </div>
    
    <script>
        function copyLink() {
            navigator.clipboard.writeText('https://scuti-9j8t.vercel.app');
            document.querySelector('.copy-btn').textContent = '✅ 已复制!';
            setTimeout(() => {
                document.querySelector('.copy-btn').textContent = '📋 复制链接';
            }, 2000);
        }
    </script>
</body>
</html>
