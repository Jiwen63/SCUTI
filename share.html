<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scuti 访问</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { font-size: 32px; margin-bottom: 8px; }
        p { color: #666; margin-bottom: 30px; }
        .btn {
            display: block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .link-box {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .link-box .label {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }
        .link-box .url {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            word-break: break-all;
        }
        .copy-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.2s;
        }
        .copy-btn:hover { background: #45a049; }
        .copy-btn:active { transform: scale(0.95); }
        .tip {
            font-size: 12px;
            color: #999;
            line-height: 1.5;
        }
        .qr-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }
        .qr-section h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Scuti</h1>
        <p>MBTI性格测试</p>
        
        <a href="https://scuti-9j8t.vercel.app" class="btn">
            🚀 立即访问网站
        </a>
        
        <div class="link-box">
            <div class="label">网址链接（长按复制）</div>
            <div class="url">https://scuti-9j8t.vercel.app</div>
        </div>
        
        <button class="copy-btn" onclick="copyLink()">
            📋 复制链接
        </button>
        
        <p class="tip">
            首次加载可能需要等待几秒<br>
            如果打不开，复制链接到浏览器粘贴访问
        </p>
        
        <div class="qr-section">
            <h3>扫码访问</h3>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://scuti-9j8t.vercel.app&margin=5" alt="二维码" style="border-radius: 8px;">
        </div>
    </div>
    
    <script>
        function copyLink() {
            navigator.clipboard.writeText('https://scuti-9j8t.vercel.app');
            var btn = document.querySelector('.copy-btn');
            btn.textContent = '✅ 已复制!';
            btn.style.background = '#45a049';
            setTimeout(function() {
                btn.textContent = '📋 复制链接';
                btn.style.background = '#4CAF50';
            }, 2000);
        }
    </script>
</body>
</html>
