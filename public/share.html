<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scuti - 二维码分享</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #333; font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }
        .qr-container {
            background: white;
            padding: 16px;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 24px;
        }
        .link-box {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .link-box .label { font-size: 12px; color: #888; margin-bottom: 8px; }
        .link-box .url { color: #667eea; font-size: 16px; font-weight: 600; word-break: break-all; }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .footer { margin-top: 20px; color: rgba(255,255,255,0.7); font-size: 12px; }
        
        .alternative {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }
        .alternative h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }
        .copy-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
        }
        .copy-btn:hover { background: #45a049; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Scuti</h1>
        <p class="subtitle">扫描下方二维码访问网站</p>
        
        <div class="qr-container">
            <img src="https://quickchart.io/qr?text=https://scuti-9j8t.vercel.app&size=250&margin=2" alt="QR Code" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://scuti-9j8t.vercel.app'">
        </div>
        
        <div class="link-box">
            <div class="label">网址链接（长按复制）</div>
            <div class="url">https://scuti-9j8t.vercel.app</div>
        </div>
        
        <a href="https://scuti-9j8t.vercel.app" class="btn" target="_blank">
            立即访问 →
        </a>
        
        <div class="alternative">
            <h3>备用方案：直接复制链接</h3>
            <button class="copy-btn" onclick="copyLink()">复制链接到剪贴板</button>
        </div>
    </div>
    
    <p class="footer">Scuti · 您的专属链接分享页</p>
    
    <script>
        function copyLink() {
            navigator.clipboard.writeText('https://scuti-9j8t.vercel.app').then(() => {
                alert('链接已复制！去浏览器粘贴访问~');
            }).catch(() => {
                prompt('复制失败，请手动复制以下链接：', 'https://scuti-9j8t.vercel.app');
            });
        }
    </script>
</body>
</html>
